name: Copilot and Engineer Review
on:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
  pull-requests: write
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Request Human Reviewers
        uses: actions/github-script@v5
        with:
          script: |
            const reviewers = ['0PeterAdel', 'tawfik0x00'];
            await github.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers
            });